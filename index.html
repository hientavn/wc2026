<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 · Bảng đấu & Kết quả</title>
<style>
  :root{
    --gold:#E8B84B; --gold-dim:#9A7B2E; --bg:#0B0E14; --panel:#141923;
    --panel2:#1B212E; --line:#2A3344; --txt:#E6E9EF; --mute:#7A8499;
    --green:#3DD68C; --red:#FF6B6B; --blue:#5B8DEF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif; padding-bottom:60px;
  }
  .hero{
    background:radial-gradient(circle at 20% 0%, rgba(232,184,75,.18), transparent 50%), var(--panel);
    border-bottom:1px solid var(--line); padding:32px 24px 0;
  }
  .wrap{max-width:1100px; margin:0 auto;}
  .title{
    font-size:34px; font-weight:900; margin:0; letter-spacing:-1px;
    background:linear-gradient(90deg, var(--gold), #fff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-row{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;}
  .sub{color:var(--mute); font-size:13px; margin:6px 0 24px;}
  .tabs{display:flex; gap:4px; flex-wrap:wrap;}
  .tab{
    padding:12px 22px; border:none; cursor:pointer; font-size:14px; font-weight:700;
    background:transparent; color:var(--mute); border-bottom:3px solid transparent;
  }
  .tab.active{color:var(--gold); border-bottom-color:var(--gold);}
  .content{max-width:1100px; margin:0 auto; padding:28px 24px 0;}
  .lead{color:var(--mute); font-size:13px; line-height:1.6; margin:0 0 18px;}
  .lead b{color:var(--gold); font-weight:600;}

  /* Groups */
  .grid-groups{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px;}
  .gcard{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  .ghead{
    display:flex; align-items:center; gap:10px; padding:12px 16px;
    background:linear-gradient(90deg, var(--panel2), var(--panel)); border-bottom:1px solid var(--line);
  }
  .gbadge{width:30px; height:30px; border-radius:8px; background:var(--gold); color:var(--bg);
    display:grid; place-items:center; font-weight:800; font-size:16px;}
  .glabel{font-weight:700; letter-spacing:1px; color:var(--mute); font-size:12px;}
  .grow{display:grid; grid-template-columns:22px 1fr 28px 28px 28px 38px 34px; gap:4px;
    padding:8px; align-items:center; border-radius:8px;}
  .ghdr{font-size:10px; color:var(--mute); font-weight:700; padding:4px 8px;}
  .center{text-align:center;}
  .team{display:flex; align-items:center; gap:8px; min-width:0;}
  .team .nm{font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .flag{font-size:18px; line-height:1;}
  .qual{background:rgba(232,184,75,.07); border-left:3px solid var(--gold);}
  .qual .nm, .qual .rank, .qual .pts{color:var(--gold); font-weight:700;}

  /* Matches */
  .filters{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .fbtn{padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer;
    border:1px solid var(--line); background:transparent; color:var(--mute);}
  .fbtn.active{border-color:var(--gold); background:rgba(232,184,75,.12); color:var(--gold);}
  .mlist{display:flex; flex-direction:column; gap:10px;}
  .match{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 18px;}
  .mgrid{display:grid; grid-template-columns:1fr 90px 1fr; gap:12px; align-items:center;}
  .mhome{display:flex; justify-content:flex-end;}
  .maway{display:flex; justify-content:flex-start;}
  .mscore{text-align:center; font-weight:800; font-size:18px; letter-spacing:1px;}
  .mtime{text-align:center; font-size:11px; color:var(--mute); font-weight:700;}
  .mg{font-size:9px; color:var(--mute); margin-top:2px;}
  .win{color:var(--gold)!important; font-weight:700!important;}
  .wpbar{display:flex; height:6px; border-radius:3px; overflow:hidden; background:var(--line); margin-top:10px;}
  .wplabel{display:flex; justify-content:space-between; font-size:9px; color:var(--mute); margin-top:4px;}
  .score-input{
    width:38px; background:var(--panel2); border:1px solid var(--line); color:var(--txt);
    border-radius:6px; text-align:center; font-size:16px; font-weight:700; padding:4px 0;
  }
  .save-btn{margin-top:10px; width:100%; padding:8px; border-radius:8px; cursor:pointer;
    background:rgba(232,184,75,.12); border:1px solid var(--gold-dim); color:var(--gold);
    font-weight:700; font-size:12px;}
  .save-btn:hover{background:rgba(232,184,75,.2);}

  /* Bracket */
  .h3{font-size:13px; color:var(--mute); letter-spacing:1px; font-weight:700; margin:0 0 12px;}
  .leaders{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:28px;}
  .leader{background:var(--panel); border:1px solid var(--gold-dim); border-radius:10px; padding:10px 12px;}
  .leader .tag{font-size:9px; color:var(--gold); font-weight:700; margin-bottom:4px;}
  .bracket{overflow-x:auto; padding-bottom:8px;}
  .brow{display:flex; gap:40px; min-width:760px; align-items:center;}
  .bcol{display:flex; flex-direction:column; justify-content:center;}
  .rname{font-size:10px; color:var(--gold); font-weight:700; letter-spacing:1px; margin-bottom:6px; text-align:center;}
  .slot{background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; min-width:140px; font-size:12px; font-weight:700;}
  .slot.empty{color:var(--mute);}
  .pair{display:flex; flex-direction:column; gap:6px;}
  .note{color:var(--mute); font-size:12px; margin-top:16px; font-style:italic;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="hero">
  <div class="wrap">
    <div class="hero-row">
      <span style="font-size:34px;">🏆</span>
      <h1 class="title">WORLD CUP 2026</h1>
      <span style="font-size:13px; color:var(--mute); font-weight:600;">🇺🇸🇨🇦🇲🇽 · 48 đội</span>
    </div>
    <p class="sub">Bảng đấu, kết quả và sơ đồ knock-out — bảng xếp hạng tự tính từ tỷ số bạn nhập</p>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="groups">Bảng đấu</button>
      <button class="tab" data-tab="matches">Lịch &amp; Kết quả</button>
      <button class="tab" data-tab="bracket">Knock-out</button>
    </div>
  </div>
</div>

<div class="content">
  <div id="status" style="font-size:12px;font-weight:600;color:var(--mute);margin-bottom:14px;"></div>
  <div id="groups"></div>
  <div id="matches" class="hidden"></div>
  <div id="bracket" class="hidden"></div>
</div>

<button id="resetbtn" onclick="resetData()" style="display:none;position:fixed;right:18px;bottom:18px;z-index:50;padding:12px 18px;border-radius:30px;border:1px solid var(--line);cursor:pointer;background:var(--panel2);color:var(--mute);font-weight:700;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.4);">↺ Xóa dữ liệu đã nhập</button>

//  • Trận có tỷ số (hs/as): cộng cả điểm lẫn hiệu số.
//  • Trận chỉ biết kết quả (res): cộng điểm, không cộng hiệu số.
function computeStandings(){
  const tbl = {};
  for(const g in GROUPS){
    tbl[g] = {};
    GROUPS[g].forEach(c => tbl[g][c] = {c, w:0, d:0, l:0, gf:0, ga:0, o:OFFRANK[c]||9, pts:0});
  }
  MATCHES.forEach(m => {
    if(!m.done) return;
    const t = tbl[m.g]; if(!t) return;
    let res = m.res;
    if(res === undefined && m.hs!=null && m.as!=null){
      // có tỷ số → cộng hiệu số + suy ra kết quả
      t[m.h].gf+=m.hs; t[m.h].ga+=m.as;
      t[m.a].gf+=m.as; t[m.a].ga+=m.hs;
      res = m.hs>m.as ? "W" : m.hs<m.as ? "L" : "D";
    }
    if(res==="W"){ t[m.h].w++; t[m.h].pts+=3; t[m.a].l++; }
    else if(res==="L"){ t[m.a].w++; t[m.a].pts+=3; t[m.h].l++; }
    else if(res==="D"){ t[m.h].d++; t[m.a].d++; t[m.h].pts++; t[m.a].pts++; }
  });
  const out = {};
  for(const g in tbl){
    out[g] = Object.values(tbl[g]).sort((x,y)=>
      y.pts-x.pts || x.o-y.o || (y.gf-y.ga)-(x.gf-x.ga) || y.gf-x.gf
    );
  }
  return out;
}

function flag(c){ return `<span class="flag">${FLAGS[c]||"🏳️"}</span>`; }
const LS_KEY = "wc2026_scores";

// ── TAB 1: BẢNG ĐẤU ──
function renderGroups(){
  const S = computeStandings();
  let html = `<p class="lead">12 bảng, 4 đội mỗi bảng. <b>2 đội đầu mỗi bảng</b> đi tiếp, cộng <b>8 đội hạng 3 tốt nhất</b> → 32 đội vào knock-out. Cột Đ = điểm, HS = hiệu số. Bảng xếp hạng tự cập nhật theo tỷ số.</p><div class="grid-groups">`;
  for(const g in S){
    html += `<div class="gcard"><div class="ghead"><span class="gbadge">${g}</span><span class="glabel">BẢNG ${g}</span></div><div style="padding:6px 8px;">
      <div class="grow ghdr"><span>#</span><span>ĐỘI</span><span class="center">T</span><span class="center">H</span><span class="center">B</span><span class="center">HS</span><span class="center">Đ</span></div>`;
    S[g].forEach((r,i)=>{
      const q = i<2 ? "qual" : "";
      const gd = r.gf-r.ga;
      const gdTxt = (r.gf===0 && r.ga===0) ? "–" : (gd>0?"+"+gd:gd);
      html += `<div class="grow ${q}">
        <span class="rank" style="font-size:13px;color:var(--mute);font-weight:700;">${i+1}</span>
        <span class="team">${flag(r.c)}<span class="nm">${NAMES[r.c]}</span></span>
        <span class="center" style="font-size:13px;">${r.w}</span>
        <span class="center" style="font-size:13px;color:var(--mute);">${r.d}</span>
        <span class="center" style="font-size:13px;color:var(--mute);">${r.l}</span>
        <span class="center" style="font-size:12px;color:var(--mute);">${gdTxt}</span>
        <span class="pts center" style="font-size:15px;font-weight:800;">${r.pts}</span>
      </div>`;
    });
    html += `</div></div>`;
  }
  html += `</div>`;
  document.getElementById("groups").innerHTML = html;
}

// ── TAB 2: LỊCH & KẾT QUẢ ──
let curFilter = "all";
function renderMatches(){
  const list = MATCHES.filter(m => curFilter==="all"?true:curFilter==="done"?m.done:!m.done);
  // map điểm hiện tại của từng đội (để hiện ở trận chưa đá)
  const S = computeStandings();
  const PTS = {};
  for(const g in S) S[g].forEach(r => PTS[r.c] = r.pts);
  let html = `<div class="filters">
    ${["all","done","upcoming"].map(f=>`<button class="fbtn ${curFilter===f?"active":""}" data-f="${f}">${f==="all"?"Tất cả":f==="done"?"Đã đấu":"Sắp diễn ra"}</button>`).join("")}
  </div><div class="mlist">`;
  list.forEach(m=>{
    const idx = MATCHES.indexOf(m);
    const hasScore = m.done && m.hs!=null && m.as!=null;
    const resOnly = m.done && !hasScore && m.res;
    const hw = hasScore ? m.hs>m.as : resOnly && m.res==="W";
    const aw = hasScore ? m.as>m.hs : resOnly && m.res==="L";
    const ptsTag = c => !m.done
      ? `<span style="display:block;font-size:9px;color:var(--mute);font-weight:600;margin-top:1px;">${PTS[c]??0} điểm</span>` : "";
    html += `<div class="match"><div class="mgrid">
      <div class="mhome"><span class="team" style="flex-direction:column;align-items:flex-end;gap:1px;"><span style="display:flex;align-items:center;gap:8px;">${flag(m.h)}<span class="nm ${hw?"win":""}">${NAMES[m.h]}</span></span>${ptsTag(m.h)}</span></div>
      <div>`;
    if(hasScore){
      html += `<div class="mscore" style="color:${m.hs===m.as?"var(--txt)":"var(--gold)"};">${m.hs} – ${m.as}</div>`;
    } else if(resOnly){
      const lab = m.res==="D" ? "HÒA" : (m.res==="W"?NAMES[m.h]:NAMES[m.a])+" THẮNG";
      html += `<div style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:.5px;">${lab}</div>
               <div style="font-size:8px;color:var(--mute);margin-top:2px;">chưa rõ tỷ số</div>`;
    } else {
      html += `<div class="mtime">${m.t.split(" ")[1]}</div>`;
    }
    html += `<div class="mg center">Bảng ${m.g} · ${m.t.split(" ")[0]}</div></div>
      <div class="maway"><span class="team" style="flex-direction:column;align-items:flex-start;gap:1px;"><span style="display:flex;align-items:center;gap:8px;">${flag(m.a)}<span class="nm ${aw?"win":""}">${NAMES[m.a]}</span></span>${ptsTag(m.a)}</span></div>
    </div>`;
    if(!m.done && m.wp){
      html += `<div class="wpbar">
        <div style="width:${m.wp.h}%;background:var(--gold);"></div>
        <div style="width:${m.wp.d}%;background:var(--mute);"></div>
        <div style="width:${m.wp.a}%;background:var(--blue);"></div></div>
        <div class="wplabel"><span>${m.wp.h}% thắng</span><span>${m.wp.d}% hòa</span><span>${m.wp.a}% thắng</span></div>`;
    }
    // form nhập tỷ số: cho cả trận sắp đá LẪN trận res (để bổ sung hiệu số)
    if(!hasScore){
      html += `<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;">
        <input class="score-input" id="hs-${idx}" type="number" min="0" placeholder="-">
        <span style="color:var(--mute);font-weight:700;">–</span>
        <input class="score-input" id="as-${idx}" type="number" min="0" placeholder="-">
      </div>
      <button class="save-btn" data-save="${idx}">Lưu tỷ số &amp; cập nhật bảng</button>`;
    }
    html += `</div>`;
  });
  html += `</div>`;
  document.getElementById("matches").innerHTML = html;

  document.querySelectorAll("[data-f]").forEach(b=>b.onclick=()=>{curFilter=b.dataset.f; renderMatches();});
  document.querySelectorAll("[data-save]").forEach(b=>b.onclick=()=>{
    const i = +b.dataset.save;
    const hs = parseInt(document.getElementById(`hs-${i}`).value);
    const as = parseInt(document.getElementById(`as-${i}`).value);
    if(isNaN(hs)||isNaN(as)){ b.textContent="⚠ Nhập đủ 2 tỷ số"; setTimeout(()=>b.textContent="Lưu tỷ số & cập nhật bảng",1500); return; }
    MATCHES[i].hs=hs; MATCHES[i].as=as; MATCHES[i].done=true; delete MATCHES[i].res;
    saveLocal();
    document.getElementById("resetbtn").style.display = "block";
    renderGroups(); renderMatches(); renderBracket();
  });
}

// ── Lưu / tải tỷ số trên máy (localStorage) ──
// Chỉ lưu các tỷ số BẠN nhập, theo khóa bảng+đội. Refresh/đóng mở lại vẫn còn.
function matchKey(m){ return m.g + "_" + m.h + "_" + m.a; }

function saveLocal(){
  const edits = {};
  MATCHES.forEach(m => {
    if(m.done && m.hs!=null && m.as!=null) edits[matchKey(m)] = [m.hs, m.as];
  });
  try{ localStorage.setItem(LS_KEY, JSON.stringify(edits)); }catch(e){}
}

function loadLocal(){
  let edits = {};
  try{ edits = JSON.parse(localStorage.getItem(LS_KEY) || "{}"); }catch(e){}
  let count = 0;
  MATCHES.forEach(m => {
    const e = edits[matchKey(m)];
    if(e){ m.hs = e[0]; m.as = e[1]; m.done = true; delete m.res; count++; }
  });
  return count;
}

function resetData(){
  if(!confirm("Xóa toàn bộ tỷ số bạn đã nhập trên máy này?")) return;
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  location.reload();
}

// ── TAB 3: KNOCK-OUT ──
function renderBracket(){
  const S = computeStandings();
  const leaders = Object.keys(S).map(g=>({g, c:S[g][0].c}));
  let html = `<p class="lead">Vòng knock-out bắt đầu từ <b>vòng 1/16 (32 đội)</b>. Vòng bảng chưa xong nên nhánh chưa chốt — dưới đây là các đội <b>đang dẫn đầu</b> mỗi bảng.</p>`;
  html += `<h3 class="h3">ĐANG DẪN ĐẦU 12 BẢNG</h3><div class="leaders">`;
  leaders.forEach(({g,c})=>{
    html += `<div class="leader"><div class="tag">NHẤT BẢNG ${g}</div><div class="team">${flag(c)}<span class="nm">${NAMES[c]}</span></div></div>`;
  });
  html += `</div><h3 class="h3">SƠ ĐỒ XƯƠNG CÁ (KHUNG)</h3><div class="bracket"><div class="brow">`;
  const rounds=[{t:"1/16",n:4},{t:"Tứ kết",n:2},{t:"Bán kết",n:1},{t:"Chung kết",n:1,final:true}];
  rounds.forEach(r=>{
    html += `<div class="bcol" style="gap:${r.final?0:24}px;"><div class="rname">${r.t.toUpperCase()}</div>`;
    for(let i=0;i<r.n;i++){
      html += `<div class="pair"><div class="slot empty">Chờ xác định</div><div class="slot empty">Chờ xác định</div>${r.final?'<div style="text-align:center;margin-top:10px;font-size:24px;">🏆</div>':''}</div>`;
    }
    html += `</div>`;
  });
  html += `</div></div><p class="note">Khung rút gọn để dễ nhìn — sơ đồ đầy đủ 32 đội sẽ tự chốt cặp khi vòng bảng kết thúc.</p>`;
  document.getElementById("bracket").innerHTML = html;
}

// ── Tabs ──
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  ["groups","matches","bracket"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById(t.dataset.tab).classList.remove("hidden");
});

// ── Khởi tạo: nạp tỷ số đã lưu trên máy rồi dựng giao diện ──
const restored = loadLocal();
const banner = document.getElementById("status");
if(banner){
  if(restored > 0){
    banner.textContent = "✓ Đã khôi phục " + restored + " tỷ số bạn nhập (lưu trên máy này)";
    banner.style.color = "var(--green)";
    document.getElementById("resetbtn").style.display = "block";
  } else {
    banner.textContent = "Tỷ số bạn nhập sẽ tự lưu trên máy này";
    banner.style.color = "var(--mute)";
  }
  setTimeout(()=>{ banner.style.display = "none"; }, 3000);
}
renderGroups(); renderMatches(); renderBracket();

</script>
</body>
</html>
